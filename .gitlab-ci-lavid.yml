variables:
  APP_NAME: tradcore
  APP_URL: tradcore-dth.vlibras.lavid.ufpb.br

include:
  # 🔹 Template padrão para branches dev
  - project: 'vlibras2019/DevOps'
    ref: main
    file: '/Default-App-Pipeline-VLibras.gitlab-ci.yml'
    rules:
      - if: '$CI_COMMIT_REF_NAME == "dev"'

# Sobrescrevendo o bloco "artifacts" do job container-build herdado
container-build:
  artifacts:
    name: "${CI_JOB_NAME}-${CI_COMMIT_SHORT_SHA}"
    reports:
      dotenv: build*.env
    paths:
      - build*.env  # ❌ removendo oci-export*/ para teste
    expire_in: 1 hour
